<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Labour Market Analysis</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar navbar-dark navbar-custom mb-5">
        <div class="container-lg">
            <span class="navbar-brand mb-0 h1">
                <i class="bi bi-graph-up"></i> Labour Market Analysis
            </span>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container-lg">
        <!-- Filters and Plot -->
        <div class="row mb-5">
            <!-- Sidebar Filters -->
            <div class="col-lg-3">
                <div class="filter-panel p-4">
                    <h5 class="mb-4">
                        <i class="bi bi-funnel"></i> Filters
                    </h5>
                    
                    <!-- Year Range Filter -->
                    <div class="mb-4">
                        <h6 class="mb-3">Jaar bereik</h6>
                        <div class="year-range-inputs">
                            <input type="number" id="yearMin" class="form-control" 
                                   min="{{ min_year }}" max="{{ max_year }}" 
                                   value="{{ min_year }}" placeholder="Min">
                            <input type="number" id="yearMax" class="form-control" 
                                   min="{{ min_year }}" max="{{ max_year }}" 
                                   value="{{ max_year }}" placeholder="Max">
                        </div>
                        <button type="button" class="btn btn-sm btn-outline-secondary w-100" 
                                onclick="resetYears()">Reset years</button>
                    </div>
                    
                    <hr>
                    
                    <!-- Sector Filter -->
                    <div>
                        <h6 class="mb-3">Sectoren</h6>
                        <p class="text-muted small mb-3">Selecteer sectoren om in de grafiek te tonen.</p>
                        <div class="d-grid gap-2 mb-3">
                            <button type="button" class="btn btn-primary btn-sm btn-filter" 
                                    onclick="selectAll()">
                                <i class="bi bi-check-all"></i> Select all
                            </button>
                            <button type="button" class="btn btn-outline-secondary btn-sm btn-filter" 
                                    onclick="deselectAll()">
                                <i class="bi bi-x-circle"></i> Deselect all
                            </button>
                        </div>
                        <select id="sectorFilter" class="form-select" multiple>
                            {% for sector in sectors %}
                            <option value="{{ sector }}" selected>{{ sector }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>
            </div>
            
            <!-- Main Plot -->
            <div class="col-lg-9">
                <div class="plot-container">
                    {{ plot_html|safe }}
                </div>
            </div>
        </div>

        <!-- Sample Data Table -->
        <div class="row">
            <div class="col-12">
                <h2>Voorbeelddata</h2>
                <div class="data-table table-responsive">
                    {{ table|safe }}
                </div>
            </div>
        </div>

        <!-- Predictions Table -->
        <div class="row mt-5">
            <div class="col-12">
                <h2>Prognoses</h2>
                <div class="data-table table-responsive">
                    {{ pred_table|safe }}
                </div>
            </div>
        </div>

        <!-- Footer -->
        <footer class="mt-5 pt-5 text-center text-muted pb-5">
            <small>Dutch Labour Market Analysis Dashboard</small>
        </footer>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <script src="{{ url_for('static', filename='dashboard.js') }}"></script>

    <!-- Inline template data -->
    <script>
        const sectorData = {{ sector_data_json|safe }};
        const minYear = {{ min_year }};
        const maxYear = {{ max_year }};
    </script>
</body>
</html>
